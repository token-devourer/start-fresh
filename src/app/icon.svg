<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#142019"/>
      <stop offset="1" stop-color="#070b09"/>
    </linearGradient>
    <linearGradient id="card" x1="118" y1="74" x2="394" y2="446" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a4335"/>
      <stop offset="0.55" stop-color="#0f1814"/>
      <stop offset="1" stop-color="#080d0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="132" y1="68" x2="390" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff1b8"/>
      <stop offset="0.35" stop-color="#f9d063"/>
      <stop offset="0.65" stop-color="#e3a127"/>
      <stop offset="1" stop-color="#8a4f0e"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8273"/>
      <stop offset="1" stop-color="#b81c12"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- card -->
  <g filter="url(#shadow)" transform="rotate(-8 256 270)">
    <rect x="116" y="120" width="280" height="360" rx="36" fill="url(#card)" stroke="url(#gold)" stroke-width="14"/>
    <rect x="116" y="120" width="280" height="360" rx="36" fill="url(#sheen)"/>

    <!-- ornate inner frame -->
    <rect x="142" y="146" width="228" height="308" rx="24" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.55"/>

    <!-- Big proud "CC" monogram, stylized -->
    <g transform="translate(256 308)" fill="url(#gold)">
      <!-- left C -->
      <path d="M-104 -78c-44 0-78 36-78 80s34 80 78 80c26 0 46-10 60-26l-22-22c-9 11-22 18-38 18-27 0-48-22-48-50s21-50 48-50c16 0 29 7 38 18l22-22c-14-16-34-26-60-26z" transform="scale(0.62)"/>
      <!-- right C overlapping -->
      <path d="M-16 -78c-44 0-78 36-78 80s34 80 78 80c26 0 46-10 60-26l-22-22c-9 11-22 18-38 18-27 0-48-22-48-50s21-50 48-50c16 0 29 7 38 18l22-22c-14-16-34-26-60-26z" transform="scale(0.62) translate(120 0)"/>
    </g>

    <!-- gilded base flourish -->
    <path d="M158 432h196" stroke="url(#gold)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <circle cx="256" cy="432" r="5" fill="url(#gold)"/>
  </g>

  <!-- crown above (the "sombong" / pride symbol) -->
  <g transform="translate(256 88)" filter="url(#shadow)">
    <path d="M-92 28 L-92 -8 L-58 22 L-30 -28 L0 18 L30 -28 L58 22 L92 -8 L92 28 Z"
          fill="url(#gold)" stroke="#5a3608" stroke-width="3" stroke-linejoin="round"/>
    <rect x="-92" y="28" width="184" height="14" rx="4" fill="url(#gold)" stroke="#5a3608" stroke-width="2"/>
    <!-- jewels -->
    <circle cx="-58" cy="22" r="6" fill="url(#gem)"/>
    <circle cx="0" cy="18" r="8" fill="url(#gem)"/>
    <circle cx="58" cy="22" r="6" fill="url(#gem)"/>
  </g>

  <!-- subtle sparkles for swagger -->
  <g fill="#f9d063">
    <path d="M64 200 l4 12 12 4 -12 4 -4 12 -4-12 -12-4 12-4z" opacity="0.75"/>
    <path d="M440 320 l3 9 9 3 -9 3 -3 9 -3-9 -9-3 9-3z" opacity="0.7"/>
    <circle cx="92" cy="430" r="3.5" opacity="0.6"/>
    <circle cx="430" cy="150" r="3" opacity="0.55"/>
  </g>
</svg>
